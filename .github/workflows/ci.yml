name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv run --extra dev ruff check src tests
      - run: uv run --extra dev ruff format --check src tests
      - run: uv run python -m compileall -q src tests
      - run: uv run --extra dev pytest tests/ --cov=prompt_tool_regression_ci --cov-report=xml --cov-report=term-missing
